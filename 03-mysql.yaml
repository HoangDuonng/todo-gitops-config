apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-configmap
  namespace: todo-app
data:
  data.sql: |
    CREATE DATABASE IF NOT EXISTS `todo-auth`;
    CREATE DATABASE IF NOT EXISTS `todo-task`;
    CREATE DATABASE IF NOT EXISTS `todo-user`;

    CREATE TABLE IF NOT EXISTS `todo-auth`.`auths` (
      `id` int NOT NULL AUTO_INCREMENT,
      `user_id` int NOT NULL,
      `auth_type` enum('email_password','gmail','facebook') DEFAULT 'email_password',
      `email` varchar(255) CHARACTER SET utf8mb4 NOT NULL,
      `salt` varchar(40) CHARACTER SET utf8mb4 DEFAULT NULL,
      `password` varchar(100) CHARACTER SET utf8mb4 DEFAULT NULL,
      `facebook_id` varchar(35) CHARACTER SET utf8mb4 DEFAULT NULL,
      `created_at` datetime DEFAULT CURRENT_TIMESTAMP,
      `updated_at` datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (`id`),
      UNIQUE KEY `email` (`email`) USING BTREE,
      KEY `user_id` (`user_id`) USING BTREE,
      KEY `facebook_id` (`facebook_id`) USING BTREE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS `todo-task`.`tasks` (
      `id` int NOT NULL AUTO_INCREMENT,
      `user_id` int NOT NULL,
      `title` varchar(150) DEFAULT NULL,
      `description` text,
      `status` enum('doing','done','deleted') DEFAULT 'doing',
      `created_at` datetime DEFAULT CURRENT_TIMESTAMP,
      `updated_at` datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (`id`),
      KEY `status` (`status`) USING BTREE,
      KEY `user_id` (`user_id`) USING BTREE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS `todo-task`.`notes` (
      `id` int NOT NULL AUTO_INCREMENT,
      `user_id` int NOT NULL,
      `content` text,
      `created_at` datetime DEFAULT CURRENT_TIMESTAMP,
      `updated_at` datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (`id`),
      UNIQUE KEY `user_id` (`user_id`) USING BTREE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS `todo-user`.`users` (
      `id` int NOT NULL AUTO_INCREMENT,
      `first_name` varchar(30) CHARACTER SET utf8mb4 NOT NULL,
      `last_name` varchar(30) CHARACTER SET utf8mb4 NOT NULL,
      `email` varchar(255) CHARACTER SET utf8mb4 NOT NULL,
      `phone` varchar(30) DEFAULT NULL,
      `avatar` json DEFAULT NULL,
      `gender` enum('male','female','unknown') DEFAULT 'unknown',
      `dob` date DEFAULT NULL,
      `system_role` enum('sadmin','admin','user') DEFAULT 'user',
      `status` enum('active','waiting_verify','banned') DEFAULT 'active',
      `created_at` datetime DEFAULT CURRENT_TIMESTAMP,
      `updated_at` datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (`id`),
      UNIQUE KEY `email` (`email`) USING BTREE
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: todo-app
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: todo-app
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - "--default-authentication-plugin=mysql_native_password"
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_ROOT_HOST
              value: "%"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
            - name: mysql-initdb
              mountPath: /docker-entrypoint-initdb.d/data.sql
              subPath: data.sql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-initdb
          configMap:
            name: mysql-init-configmap
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: todo-app
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
