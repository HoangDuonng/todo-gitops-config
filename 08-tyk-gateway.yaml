---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: docker.tyk.io/tyk-gateway/tyk-gateway:v5.3.0
          ports:
            - containerPort: 8080
              name: gateway
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tyk-config-vol
              mountPath: /opt/tyk-gateway/tyk.conf
              subPath: tyk.conf
            - name: tyk-apps-vol
              mountPath: /opt/tyk-gateway/apps
          readinessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tyk-config-vol
          configMap:
            name: tyk-config
        - name: tyk-apps-vol
          configMap:
            name: tyk-apps-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: todo-app
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gateway
