apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.userService.name }}
spec:
  replicas: {{ .Values.userService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.userService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.userService.name }}
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z {{ .Values.mysql.name }} {{ .Values.mysql.servicePort }}; do echo waiting for mysql; sleep 2; done"
      containers:
        - name: {{ .Values.userService.name }}
          image: "{{ .Values.userService.image.repository }}:{{ .Values.userService.image.tag }}"
          ports:
            - containerPort: 3200
              name: gin
            - containerPort: 3201
              name: grpc
          env:
            - name: GIN_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-configmap
                  key: GIN_PORT_USER
            - name: GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-configmap
                  key: GRPC_PORT_USER
            - name: GRPC_AUTH_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: app-configmap
                  key: GRPC_AUTH_ADDRESS
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_DSN
              value: root:$(MYSQL_ROOT_PASSWORD)@tcp({{ .Values.mysql.name }}:3306)/todo-user?charset=utf8mb4&parseTime=True&loc=Local
          resources:
            {{- toYaml .Values.userService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.userService.name }}
spec:
  ports:
    - port: {{ .Values.userService.servicePort.gin }}
      targetPort: 3200
      name: gin
    - port: {{ .Values.userService.servicePort.grpc }}
      targetPort: 3201
      name: grpc
  selector:
    app: {{ .Values.userService.name }}
