apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.gitops.repoURL | quote }}
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values.yaml
        - values-tags.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: todo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
