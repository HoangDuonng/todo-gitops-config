apiVersion: v1
kind: Secret
metadata:
  name: todo-gitops-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  url: {{ .Values.gitops.repoURL | quote }}
  username: {{ .Values.gitops.username | quote }}
  password: {{ .Values.gitops.password | quote }}
