---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.gateway.name }}
spec:
  revisionHistoryLimit: 5
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.gateway.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.gateway.name }}
        {{- if .Values.global.labels }}
        {{- toYaml .Values.global.labels | nindent 8 }}
        {{- end }}
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z {{ .Values.redis.name }} {{ .Values.redis.servicePort }}; do echo waiting for redis; sleep 2; done"
      containers:
        - name: {{ .Values.gateway.name }}
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          ports:
            - containerPort: 8080
              name: gateway
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: tyk-config-vol
              mountPath: /opt/tyk-gateway/tyk.conf
              subPath: tyk.conf
            - name: tyk-apps-vol
              mountPath: /opt/tyk-gateway/apps
          readinessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /hello
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: tyk-config-vol
          configMap:
            name: tyk-config
        - name: tyk-apps-vol
          configMap:
            name: tyk-apps-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.gateway.name }}
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  ports:
    - port: {{ .Values.gateway.servicePort }}
      targetPort: 8080
  selector:
    app: {{ .Values.gateway.name }}
